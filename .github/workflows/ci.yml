name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Install, Import Check & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports cleanly
        run: python -c "import app; print('✅ App imports OK')"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Health check (start server briefly)
        run: |
          python app.py &
          sleep 4
          curl -f http://localhost:5000/health && echo "✅ Health check passed"
          kill %1
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FLASK_ENV: development

  # ── Optional: deploy to Render on push to main ─────────────────────────
